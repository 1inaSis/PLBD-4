<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthGate - Salle d'attente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    /* ========== CONFIG ========== */
    :root { --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;--space-7:48px; --bg:#060d1a;--surface:#0f1740;--surface-soft:#1a2b5e;--border:rgba(255,255,255,.24);--text:#f5f8ff;--text-soft:#c7d4ee;--accent:#00a8e8;--success:#00a651;--warning:#ffb800;--danger:#cc0000;--esi-1:#cc0000;--esi-2:#ff6600;--esi-3:#ffb800;--esi-4:#00a651;--esi-5:#0072bb; --font-ui:"Inter",sans-serif;--font-data:"JetBrains Mono",monospace;--radius:14px;--t:180ms ease; }
    body.theme-dark{--bg:#03060f;--surface:#0a1535;--surface-soft:#11244a}

    /* ========== DESIGN SYSTEM ========== */
    *{box-sizing:border-box}html{font-size:18px}body{margin:0;min-height:100vh;font-family:var(--font-ui);background:radial-gradient(circle at top,rgba(0,168,232,.2),transparent 35%),var(--bg);color:var(--text);padding:var(--space-5)}

    /* ========== COMPONENTS ========== */
    .header,.card,.patient-card,.constante{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-soft)}
    .header{padding:var(--space-5);display:grid;gap:var(--space-4)}
    .brand-row{display:flex;justify-content:space-between;align-items:center;gap:var(--space-4);flex-wrap:wrap}
    .brand{display:flex;gap:var(--space-3);align-items:center;font-weight:800}.brand small{display:block;color:var(--text-soft);font-weight:500}
    .status-indicator{display:inline-flex;align-items:center;gap:var(--space-2);padding:10px 14px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.06);font-weight:700}
    .status-indicator-dot{width:10px;height:10px;border-radius:50%;background:var(--success)} .status-indicator.error .status-indicator-dot{background:var(--danger)}
    .progress-bar{height:12px;border:1px solid var(--border);background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.progress-bar>span{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--danger),var(--warning),var(--success))}

    .badge-esi{display:inline-flex;justify-content:center;min-width:100px;padding:12px 16px;border-radius:999px;color:#fff;font:800 1rem var(--font-ui)}
    .badge-esi.esi-1{background:var(--esi-1)} .badge-esi.esi-2{background:var(--esi-2)} .badge-esi.esi-3{background:var(--esi-3);color:#1d1d1d} .badge-esi.esi-4{background:var(--esi-4)} .badge-esi.esi-5{background:var(--esi-5)}
    .patient-card{padding:var(--space-4);display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:var(--space-4);transition:background var(--t),transform var(--t),border-color var(--t)}
    .patient-card.highlight{background:rgba(0,168,232,.15);transform:translateX(4px)}
    .patient-card.critical{background:rgba(204,0,0,.2);border-color:rgba(255,120,120,.6)}
    .patient-card:active{transform:translateX(2px)}
    .patient-card.error{border-color:rgba(204,0,0,.5)}
    .patient-card.success{border-color:rgba(0,166,81,.5)}

    .btn-primary,.btn-danger,.btn-ghost{min-height:56px;border-radius:12px;border:1px solid transparent;font:800 1rem var(--font-ui);cursor:pointer;transition:transform var(--t),filter var(--t)}
    .btn-primary{background:#fff;color:#0a2342}.btn-danger{background:var(--danger);color:#fff}.btn-ghost{background:transparent;color:var(--text);border-color:var(--border)}
    .btn-primary:hover,.btn-danger:hover,.btn-ghost:hover{transform:translateY(-1px)}
    .btn-primary:active,.btn-danger:active,.btn-ghost:active{transform:translateY(0);filter:brightness(.98)}
    .btn-primary:disabled,.btn-danger:disabled,.btn-ghost:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .btn-primary.loading,.btn-danger.loading,.btn-ghost.loading{opacity:.7;pointer-events:none}
    .btn-primary.error,.btn-danger.error,.btn-ghost.error{box-shadow:0 0 0 2px rgba(204,0,0,.35)}
    .btn-primary.success,.btn-danger.success,.btn-ghost.success{box-shadow:0 0 0 2px rgba(0,166,81,.35)}

    .status-indicator.success{border-color:rgba(0,166,81,.45)}
    .status-indicator.loading{opacity:.8}

    .constante{padding:var(--space-4);display:grid;gap:var(--space-2)}
    .constante .v{font:700 2.15rem var(--font-data)}
    .constante .l{color:var(--text-soft)}

    /* ========== LAYOUT ========== */
    .layout{max-width:1800px;margin:0 auto;display:grid;gap:var(--space-4)}
    .top-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:var(--space-4)}
    .queue{display:grid;gap:var(--space-3)}
    .board-title{font-size:2.2rem;margin:0}
    .big-time{font:700 3.3rem var(--font-data)}
    .alert{padding:var(--space-4);border-radius:var(--radius);border:1px solid rgba(255,120,120,.7);background:rgba(204,0,0,.24);display:flex;justify-content:space-between;gap:var(--space-4);align-items:center;animation:redPulse 1.5s infinite alternate}
    #queue .patient-card strong{font-size:1.5rem}
    #queue .patient-card > div{font-size:1.08rem}
    @keyframes redPulse{from{box-shadow:0 0 0 0 rgba(204,0,0,.25)}to{box-shadow:0 0 0 14px rgba(204,0,0,0)}}

    @media (max-width:1180px){html{font-size:17px}.top-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.patient-card{grid-template-columns:1fr auto}}
    @media (max-width:760px){html{font-size:16px}body{padding:var(--space-3)}.top-grid{grid-template-columns:1fr}.big-time{font-size:2.2rem}}
  </style>
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="brand-row">
        <div class="brand">
          <svg viewBox="0 0 24 24" fill="none" width="36" height="36" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="7" fill="rgba(0,168,232,.2)"/><path d="M12 6v12M6 12h12" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/></svg>
          <div>HealthGate<small>Salle d'attente urgences</small></div>
        </div>
        <div class="status-indicator" id="netState"><span class="status-indicator-dot"></span><span id="netText">Connecte</span></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:end;gap:16px;flex-wrap:wrap"><h1 class="board-title">File d'attente en temps reel</h1><div class="big-time" id="clock">--:--</div></div>
      <div class="progress-bar"><span></span></div>
    </header>

    <section class="top-grid">
      <article class="constante"><div class="l">Patients en attente</div><div class="v" id="countWaiting">0</div></article>
      <article class="constante"><div class="l">Niveaux critiques ESI 1-2</div><div class="v" id="countCritical">0</div></article>
      <article class="constante"><div class="l">Attente moyenne</div><div class="v" id="avgWait">0 min</div></article>
      <article class="constante"><div class="l">Derniere mise a jour</div><div class="v" id="lastUpdate">-</div></article>
    </section>

    <section class="alert" id="criticalAlert"><div><strong>ALERTE CRITIQUE</strong><div id="alertText">Patient ESI 1 en attente</div></div><button class="btn-danger" type="button">Priorite equipe</button></section>

    <section class="queue" id="queue"></section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js" crossorigin="anonymous"></script>
  <script>
    const state = { connected: false, file: [], alertes: [] };

    const Q = document.getElementById('queue');
    const CW = document.getElementById('countWaiting');
    const CC = document.getElementById('countCritical');
    const AW = document.getElementById('avgWait');
    const LU = document.getElementById('lastUpdate');
    const AT = document.getElementById('alertText');
    const CLK = document.getElementById('clock');
    const NET = document.getElementById('netText');
    const NS = document.getElementById('netState');

    function applyTheme() {
      const h = new Date().getHours();
      if ((window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) || h >= 19 || h <= 6) {
        document.body.classList.add('theme-dark');
      }
    }

    function tick() {
      const d = new Date();
      const v = d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      CLK.textContent = v;
      LU.textContent = v;
    }

    function urgenceLabel(esi) {
      if (esi <= 1) return 'Critique';
      if (esi === 2) return 'Prioritaire';
      if (esi === 3) return 'Urgent';
      if (esi === 4) return 'Observation';
      return 'Non critique';
    }

    function renderQueue(highlightId) {
      Q.innerHTML = state.file
        .map((p) => {
          const esi = p.esi_actuel || p.esi_predit || 5;
          const pid = p.patient_id || '-';
          const wait = Number(p.temps_attente_min || 0).toFixed(0);
          const nom = `${p.prenom || ''} ${p.nom || ''}`.trim() || 'Patient';
          return `<article class="patient-card ${esi <= 2 ? 'critical' : ''} ${highlightId === pid ? 'highlight' : ''}"><div><strong style="font-size:1.4rem">${pid}</strong><div>${nom}</div></div><div class="badge-esi esi-${esi}">ESI ${esi}</div><div style="font-family:var(--font-data);font-size:1.6rem">${wait} min</div><div>${urgenceLabel(esi)}</div></article>`;
        })
        .join('');
    }

    function refreshStats() {
      const total = state.file.length;
      const critiques = state.file.filter((p) => (p.esi_actuel || p.esi_predit || 5) <= 2);
      const waitAvg = total
        ? Math.round(state.file.reduce((acc, p) => acc + Number(p.temps_attente_min || 0), 0) / total)
        : 0;

      CW.textContent = String(total);
      CC.textContent = String(critiques.length);
      AW.textContent = `${waitAvg} min`;

      const c = critiques[0];
      AT.textContent = c
        ? `${c.patient_id} - ${`${c.prenom || ''} ${c.nom || ''}`.trim()} (${Number(c.temps_attente_min || 0).toFixed(0)} min)`
        : 'Aucune alerte critique';
    }

    async function loadFile() {
      try {
        const res = await fetch('/api/file');
        const json = await res.json();
        if (!res.ok) return;
        state.file = json.file || [];
        state.alertes = json.alertes || [];
        renderQueue();
        refreshStats();
      } catch (_) {
        // ignore transient network errors in dashboard mode
      }
    }

    function setNet(on) {
      state.connected = on;
      NET.textContent = on ? 'Connecte' : 'Hors ligne';
      NS.className = on ? 'status-indicator' : 'status-indicator error';
    }

    function connectSocket() {
      try {
        const s = io();
        s.on('connect', () => setNet(true));
        s.on('disconnect', () => setNet(false));
        s.on('file_mise_a_jour', (payload) => {
          if (!payload) return;
          state.file = payload.file || [];
          state.alertes = payload.alertes || [];
          renderQueue();
          refreshStats();
        });
        s.on('alerte_critique', (payload) => {
          if (!payload) return;
          renderQueue(payload.patient_id);
          refreshStats();
        });
      } catch (_) {
        setNet(false);
      }
    }

    applyTheme();
    tick();
    setInterval(tick, 1000);
    loadFile();
    setInterval(loadFile, 10000);
    connectSocket();
  </script>
</body>
</html>
