<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthGate - Medecin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    /* ========== CONFIG ========== */
    :root{--space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;--space-7:48px;--bg:#edf3fa;--surface:#fff;--surface-soft:#f3f8fd;--border:#b9cbe0;--text:#0a1a2a;--text-soft:#3a5779;--primary:#0a2342;--accent:#00a8e8;--success:#00a651;--warning:#ffb800;--danger:#cc0000;--esi-1:#cc0000;--esi-2:#ff6600;--esi-3:#ffb800;--esi-4:#00a651;--esi-5:#0072bb;--font-ui:"Inter",sans-serif;--font-data:"JetBrains Mono",monospace;--radius:14px;--t:180ms ease}
    body.theme-dark{--bg:#0b1424;--surface:#14203a;--surface-soft:#1b2d4f;--border:#38567c;--text:#eef6ff;--text-soft:#cad9ef;--primary:#5ca7ff;--accent:#35c6ff}

    /* ========== DESIGN SYSTEM ========== */
    *{box-sizing:border-box}html{font-size:17px}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-ui);padding:var(--space-4)}

    /* ========== COMPONENTS ========== */
    .header,.card,.patient-card,.constante{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
    .header{padding:var(--space-5);display:flex;justify-content:space-between;align-items:center;gap:var(--space-4);flex-wrap:wrap;background:linear-gradient(180deg,rgba(0,168,232,.1),transparent)}
    .status-indicator{display:inline-flex;align-items:center;gap:var(--space-2);padding:10px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface-soft);font-weight:700}
    .status-indicator-dot{width:10px;height:10px;border-radius:50%;background:var(--success)} .status-indicator.error .status-indicator-dot{background:var(--danger)}
    .badge-esi{display:inline-flex;min-width:104px;justify-content:center;padding:11px 16px;border-radius:999px;color:#fff;font-weight:800;font-size:1.03rem}.badge-esi.esi-1{background:var(--esi-1)}.badge-esi.esi-2{background:var(--esi-2)}.badge-esi.esi-3{background:var(--esi-3);color:#222}.badge-esi.esi-4{background:var(--esi-4)}.badge-esi.esi-5{background:var(--esi-5)}
    .patient-card{padding:var(--space-4);display:grid;gap:var(--space-2);cursor:pointer;transition:border-color var(--t),transform var(--t),background var(--t)} .patient-card:hover,.patient-card.active{border-color:var(--accent);transform:translateY(-1px)}
    .patient-card:active{transform:translateY(0)}
    .patient-card.error{border-color:rgba(204,0,0,.5);background:rgba(204,0,0,.08)}
    .patient-card.success{border-color:rgba(0,166,81,.5);background:rgba(0,166,81,.08)}
    .constante{padding:var(--space-4);display:grid;gap:var(--space-2)} .constante .v{font:700 2.1rem var(--font-data)} .constante .l{color:var(--text-soft);font-weight:600} .constante .trend{font:700 1rem var(--font-data)}
    .progress-bar{height:10px;border:1px solid var(--border);border-radius:999px;background:var(--surface-soft);overflow:hidden}.progress-bar>span{display:block;height:100%;width:0;transition:width var(--t)}
    .btn-primary,.btn-danger,.btn-ghost{min-height:58px;border-radius:12px;border:1px solid transparent;font:800 1.03rem var(--font-ui);cursor:pointer;transition:transform var(--t),filter var(--t)}
    .btn-primary{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}.btn-ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
    .btn-primary:hover,.btn-danger:hover,.btn-ghost:hover{transform:translateY(-1px)}
    .btn-primary:active,.btn-danger:active,.btn-ghost:active{transform:translateY(0);filter:brightness(.98)}
    .btn-primary:disabled,.btn-danger:disabled,.btn-ghost:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .btn-primary.loading,.btn-danger.loading,.btn-ghost.loading{opacity:.7;pointer-events:none}
    .btn-primary.error,.btn-danger.error,.btn-ghost.error{box-shadow:0 0 0 2px rgba(204,0,0,.35)}
    .btn-primary.success,.btn-danger.success,.btn-ghost.success{box-shadow:0 0 0 2px rgba(0,166,81,.35)}

    .status-indicator.success{border-color:rgba(0,166,81,.45)}
    .status-indicator.loading{opacity:.8}
    .toast{position:fixed;right:16px;top:16px;min-width:300px;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);box-shadow:0 10px 24px rgba(10,35,66,.16);display:none;z-index:30}
    .toast.show{display:block}.toast.critical{border-color:rgba(204,0,0,.45);background:rgba(204,0,0,.12)}

    /* ========== LAYOUT ========== */
    .layout{max-width:1500px;margin:0 auto;display:grid;grid-template-columns:360px 1fr;gap:var(--space-4)}
    .sidebar,.main{display:grid;gap:var(--space-4)}
    .list{display:grid;gap:var(--space-3)}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--space-3)}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-3)}
    .section-title{margin:0;font-size:1.28rem}
    .mono{font-family:var(--font-data)}
    @media (max-width:1180px){html{font-size:16px}.layout{grid-template-columns:1fr}.grid3{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:760px){.grid3,.grid2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="header">
    <div><strong style="font-size:1.5rem">HealthGate Medecin</strong><div style="color:var(--text-soft)">Vue clinique prioritaire</div></div>
    <div class="status-indicator" id="netState"><span class="status-indicator-dot"></span><span id="netText">Connecte</span></div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <section class="card" style="padding:16px">
        <h2 class="section-title">Patients actifs</h2>
        <input id="search" placeholder="Rechercher patient" style="min-height:48px;border:1px solid var(--border);border-radius:10px;padding:0 12px;background:var(--surface-soft);color:var(--text);font-size:1rem" />
      </section>
      <section class="list" id="patientList"></section>
    </aside>

    <main class="main">
      <section class="card" style="padding:16px;display:grid;gap:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap"><h2 class="section-title" id="patientName">-</h2><span class="badge-esi esi-3" id="patientEsi">ESI 3</span></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap"><span class="mono" id="patientWait">Attente: -</span><span id="patientReason" style="color:var(--text-soft)">-</span></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap"><button class="btn-primary" type="button" id="btnTaken">PRIS EN CHARGE</button><button class="btn-danger" type="button" id="btnAlert">SIGNALER</button><button class="btn-ghost" type="button">NOTES</button></div>
      </section>

      <section class="grid3" id="vitals"></section>

      <section class="grid2">
        <article class="card" style="padding:16px;display:grid;gap:10px">
          <h3 class="section-title">Diagnostic IA</h3>
          <div><strong id="diagLabel">Analyse en cours</strong><div id="diagExplain" style="color:var(--text-soft)">-</div></div>
          <div class="progress-bar"><span id="diagConfBar" style="background:var(--accent)"></span></div>
          <div class="mono" id="diagConfText">Confiance 0%</div>
          <div id="diagWarn" style="color:var(--danger);font-weight:700;display:none">Confiance faible: verifier manuellement</div>
        </article>
        <article class="card" style="padding:16px;display:grid;gap:10px">
          <h3 class="section-title">Questions ciblees</h3>
          <table style="width:100%;border-collapse:collapse"><tr><td style="padding:10px;border-bottom:1px solid var(--border)">Douleur thoracique</td><td style="padding:10px;border-bottom:1px solid var(--border)">Oui</td></tr><tr><td style="padding:10px;border-bottom:1px solid var(--border)">Dyspnee repos</td><td style="padding:10px;border-bottom:1px solid var(--border)">Oui</td></tr><tr><td style="padding:10px">Perte conscience</td><td style="padding:10px">Non</td></tr></table>
        </article>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js" crossorigin="anonymous"></script>
  <script>
    const state = { selected: 0, connected: false, patients: [] };
    const medecinId = location.pathname.split('/').pop() || 'M1';

    const vitalKeys = [
      ['Temp', 'temperature', 'C'],
      ['SpO2', 'spo2', '%'],
      ['FC', 'heart_rate', 'bpm'],
      ['TA SYS', 'bp_systolic', 'mmHg'],
      ['TA DIA', 'bp_diastolic', 'mmHg'],
      ['Gly', 'glucose', 'mg/L'],
    ];

    const L = document.getElementById('patientList');
    const N = document.getElementById('patientName');
    const E = document.getElementById('patientEsi');
    const W = document.getElementById('patientWait');
    const R = document.getElementById('patientReason');
    const V = document.getElementById('vitals');
    const DL = document.getElementById('diagLabel');
    const DX = document.getElementById('diagExplain');
    const DB = document.getElementById('diagConfBar');
    const DT = document.getElementById('diagConfText');
    const DW = document.getElementById('diagWarn');
    const T = document.getElementById('toast');
    const NET = document.getElementById('netText');
    const NS = document.getElementById('netState');
    const search = document.getElementById('search');
    const btnTaken = document.getElementById('btnTaken');
    const btnAlert = document.getElementById('btnAlert');

    function applyTheme() {
      const h = new Date().getHours();
      if ((window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) || h >= 19 || h <= 6) {
        document.body.classList.add('theme-dark');
      }
    }

    function showToast(msg, critical) {
      T.textContent = msg;
      T.className = critical ? 'toast show critical' : 'toast show';
      if (!critical) {
        setTimeout(() => {
          T.className = 'toast';
        }, 2600);
      }
    }

    function currentPatient() {
      if (!state.patients.length) return null;
      return state.patients[Math.min(state.selected, state.patients.length - 1)];
    }

    function renderList() {
      const q = (search.value || '').toLowerCase();
      const filtered = state.patients.filter((p) => {
        const txt = `${p.patient_id} ${p.nom || ''} ${p.prenom || ''} ${p.symptom_text || ''}`.toLowerCase();
        return txt.includes(q);
      });

      L.innerHTML = filtered
        .map((p, i) => {
          const esi = Number(p.esi_predit || 5);
          const name = `${p.prenom || ''} ${p.nom || ''}`.trim() || 'Patient';
          return `<article class="patient-card ${i === state.selected ? 'active' : ''}" data-i="${i}"><div style="display:flex;justify-content:space-between;gap:10px"><strong>${p.patient_id} - ${name}</strong><span class="badge-esi esi-${esi}">ESI ${esi}</span></div><div style="color:var(--text-soft)">${p.symptom_text || '-'}</div><div class="mono">${Number(p.temps_attente_min || 0).toFixed(0)} min</div></article>`;
        })
        .join('');

      L.querySelectorAll('.patient-card').forEach((card) => {
        card.onclick = () => {
          state.selected = Number(card.dataset.i);
          renderList();
          renderPatient();
        };
      });
    }

    function renderPatient() {
      const p = currentPatient();
      if (!p) {
        N.textContent = 'Aucun patient';
        E.className = 'badge-esi esi-5';
        E.textContent = 'ESI -';
        W.textContent = 'Attente: -';
        R.textContent = '-';
        V.innerHTML = '';
        DL.textContent = '-';
        DX.textContent = '-';
        DB.style.width = '0%';
        DT.textContent = 'Confiance 0%';
        DW.style.display = 'none';
        return;
      }

      const esi = Number(p.esi_predit || 5);
      N.textContent = `${(p.prenom || '')} ${(p.nom || '')}`.trim();
      E.className = `badge-esi esi-${esi}`;
      E.textContent = `ESI ${esi}`;
      W.textContent = `Attente: ${Number(p.temps_attente_min || 0).toFixed(0)} min`;
      R.textContent = p.symptom_text || 'Symptomes non renseignes';

      const constantes = p.constantes || {};
      V.innerHTML = vitalKeys
        .map(([label, key, unit]) => {
          const val = constantes[key] != null ? constantes[key] : '-';
          const n = Number(val);
          const trend = label === 'SpO2' && n < 94 ? '↓' : label === 'FC' && n > 110 ? '↑' : '→';
          const bar = label === 'SpO2' ? Math.min(100, n || 0) : label === 'Temp' ? Math.min(100, ((n || 0) / 40) * 100) : 70;
          return `<article class="constante"><div class="l">${label}</div><div class="v">${val}${unit ? ` ${unit}` : ''}</div><div class="trend">Tendance ${trend}</div><div class="progress-bar"><span style="width:${bar}%;background:${label === 'SpO2' && n < 94 ? 'var(--danger)' : 'var(--accent)'}"></span></div></article>`;
        })
        .join('');

      const conf = Number(p.confiance_modele || 0);
      DL.textContent = p.diagnostic_probable || 'Evaluation clinique complementaire';
      DX.textContent = `Priorite file: ${p.position_file || '?'}`;
      DB.style.width = `${Math.max(0, Math.min(100, conf))}%`;
      DT.textContent = `Confiance ${conf}%`;
      DW.style.display = conf < 70 ? 'block' : 'none';
    }

    async function loadPatients() {
      try {
        const res = await fetch(`/api/medecin/${medecinId}`);
        const json = await res.json();
        if (!res.ok) return;
        state.patients = json.patients || [];
        state.selected = Math.min(state.selected, Math.max(0, state.patients.length - 1));
        renderList();
        renderPatient();
      } catch (_) {
        // ignore transient errors on polling
      }
    }

    function setNet(on) {
      state.connected = on;
      NET.textContent = on ? 'Connecte' : 'Hors ligne';
      NS.className = on ? 'status-indicator' : 'status-indicator error';
    }

    function connectSocket() {
      try {
        const s = io();
        s.on('connect', () => {
          setNet(true);
          s.emit('rejoindre_medecin', { medecin_id: medecinId });
        });
        s.on('disconnect', () => setNet(false));
        s.on('file_mise_a_jour', () => loadPatients());
        s.on('alerte_critique', (payload) => {
          if (!payload) return;
          showToast(`Alerte critique: ${payload.patient_id} (ESI ${payload.esi})`, true);
          loadPatients();
        });
      } catch (_) {
        setNet(false);
      }
    }

    async function priseEnCharge() {
      const p = currentPatient();
      if (!p) return;
      try {
        const res = await fetch('/api/prise_en_charge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ patient_id: p.patient_id, medecin_id: medecinId }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || 'Erreur');
        showToast('Patient marque comme pris en charge', false);
        loadPatients();
      } catch (err) {
        showToast(`Echec prise en charge: ${err.message}`, true);
      }
    }

    async function signalerAlerte() {
      const p = currentPatient();
      if (!p) return;
      const newEsi = Math.max(1, Number(p.esi_predit || 3) - 1);
      try {
        const res = await fetch('/api/degradation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ patient_id: p.patient_id, nouvel_esi: newEsi, nouvelles_constantes: p.constantes || {} }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || 'Erreur');
        showToast(`Degradation signalee: ESI ${newEsi}`, true);
        loadPatients();
      } catch (err) {
        showToast(`Echec signalement: ${err.message}`, true);
      }
    }

    search.oninput = renderList;
    btnTaken.onclick = priseEnCharge;
    btnAlert.onclick = signalerAlerte;

    applyTheme();
    loadPatients();
    setInterval(loadPatients, 10000);
    connectSocket();
  </script>
</body>
</html>
