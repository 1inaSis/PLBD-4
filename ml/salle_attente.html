<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HealthGate — Salle d'attente</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090F; --surface:#0E131F; --border:#1E293B; --texte:#F8FAFC; --gris:#94A3B8; --primary:#3B82F6;
  --e1:#EF4444; --e2:#F59E0B; --e3:#EAB308; --e4:#10B981; --e5:#3B82F6;
  --glow-e1:rgba(239,68,68,0.4); --glow-e2:rgba(245,158,11,0.3);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--texte);min-height:100vh;display:flex;flex-direction:column;letter-spacing:-0.01em;}
header{background:rgba(14,19,31,0.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:24px 48px;display:flex;align-items:center;gap:24px;position:sticky;top:0;z-index:50;}
.logo{width:52px;height:52px;background:linear-gradient(135deg,var(--primary),#2563EB);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(59,130,246,0.25)}
.logo svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:2}
header h1{font-weight:800;font-size:28px;letter-spacing:-0.03em}
header span{font-size:14px;color:var(--gris);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;display:block;margin-top:2px}
.heure{margin-left:auto;font-weight:800;font-size:42px;line-height:1;letter-spacing:-0.03em;color:#fff;text-shadow:0 4px 24px rgba(255,255,255,0.1)}
.heure-sub{font-size:14px;color:var(--gris);text-align:right;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-top:6px}
main{flex:1;padding:40px 48px;display:flex;flex-direction:column;gap:32px;overflow:hidden;}
.top-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;box-shadow:0 20px 40px -10px rgba(0,0,0,0.3);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;}
.stat::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:4px;background:var(--border);transition:0.3s;}
.stat .v{font-weight:800;font-size:48px;letter-spacing:-0.03em;line-height:1;margin-bottom:8px;font-variant-numeric:tabular-nums;}
.stat .l{font-size:14px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:0.05em;}
.stat.alerte{background:linear-gradient(180deg,rgba(239,68,68,0.05) 0%,var(--surface) 100%);border-color:rgba(239,68,68,0.2);}
.stat.alerte::after{background:var(--e1);box-shadow:0 -4px 20px rgba(239,68,68,0.5);}
.stat.alerte .v{color:var(--e1);text-shadow:0 0 24px var(--glow-e1);}

#table-zone { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:24px; overflow:hidden; box-shadow:0 20px 40px -10px rgba(0,0,0,0.5); display:flex; flex-direction:column;}
.section-titre{padding:24px 32px;border-bottom:1px solid var(--border);font-size:15px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:0.08em;display:flex;align-items:center;gap:12px;margin:0;}
.section-titre::before{content:'';display:block;width:8px;height:8px;background:var(--primary);border-radius:50%;box-shadow:0 0 12px var(--primary);}
.section-titre::after{display:none;}
.table-file{width:100%;border-collapse:collapse;text-align:left;}
.table-file th{font-size:13px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:0.05em;padding:20px 32px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.01);}
.table-file td{padding:24px 32px;border-bottom:1px solid rgba(30,41,59,0.5);vertical-align:middle;transition:background 0.2s;}
.table-file tr:hover td{background:rgba(255,255,255,0.02);}
.pill-esi{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;font-weight:800;font-size:20px;border:2px solid;}
.p1{background:rgba(239,68,68,0.1);color:#FCA5A5;border-color:var(--e1);box-shadow:0 0 20px var(--glow-e1);animation:breath 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;}
.p2{background:rgba(245,158,11,0.1);color:#FDE68A;border-color:var(--e2);box-shadow:0 0 15px var(--glow-e2);}
.p3{background:rgba(234,179,8,0.1);color:#FEF08A;border-color:var(--e3);}
.p4{background:rgba(16,185,129,0.1);color:#6EE7B7;border-color:var(--e4);}
.p5{background:rgba(59,130,246,0.1);color:#93C5FD;border-color:var(--e5);}
@keyframes breath { 0%, 100% { opacity: 1; } 50% { opacity: .6; box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); } }
.nom{font-weight:700;font-size:20px;color:#fff;letter-spacing:-0.01em;}
.sym{font-size:14px;color:var(--gris);font-weight:500;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:6px;}
.timer{font-weight:800;font-size:24px;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
.timer.warn{color:var(--e2);}
.timer.danger{color:var(--e1);animation:breath-text 1.5s infinite;}
@keyframes breath-text { 0%, 100% { opacity:1; } 50% { opacity:.7; text-shadow:0 0 15px rgba(239,68,68,0.5); } }
.badge-att{font-size:14px;font-weight:600;padding:8px 16px;border-radius:10px;background:rgba(255,255,255,0.03);color:#CBD5E1;border:1px solid var(--border);}
.alerte-banner{background:linear-gradient(90deg, rgba(239,68,68,0.15) 0%, rgba(239,68,68,0.05) 100%);border:1px solid rgba(239,68,68,0.3);border-left:6px solid var(--e1);border-radius:16px;padding:24px 32px;display:flex;align-items:center;gap:20px;margin-bottom:24px;box-shadow:0 10px 30px -10px rgba(239,68,68,0.2)}
.alerte-banner .dot{width:16px;height:16px;background:var(--e1);border-radius:50%;flex-shrink:0;box-shadow:0 0 0 0 rgba(239,68,68,0.7);animation:pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;}
@keyframes pulse-ring { 0% { box-shadow:0 0 0 0 rgba(239,68,68,0.7); } 70% { box-shadow:0 0 0 15px rgba(239,68,68,0); } 100% { box-shadow:0 0 0 0 rgba(239,68,68,0); } }
.alerte-banner p{font-size:18px;color:#FECACA;font-weight:500;}
.alerte-banner p strong{color:#fff;font-weight:800;letter-spacing:0.02em;}
.vide{text-align:center;padding:100px 0;color:var(--gris);display:flex;flex-direction:column;align-items:center;gap:24px;}
.vide svg{opacity:0.5;width:64px;height:64px;}
.vide p{font-size:20px;font-weight:600;}
</style>
</head>
<body>
<header>
  <div class="logo"><svg viewBox="0 0 20 20" fill="none"><rect x="7" y="1" width="6" height="18" rx="2" fill="white"/><rect x="1" y="7" width="18" height="6" rx="2" fill="white"/></svg></div>
  <div><h1>HealthGate</h1><span>File d'attente en temps réel</span></div>
  <div style="margin-left:auto;text-align:right">
    <div class="heure" id="heure">—</div>
    <div class="heure-sub" id="date-txt">—</div>
  </div>
</header>

<main>
  <div id="alertes-zone"></div>

  <div class="top-stats">
    <div class="stat"><div class="v" id="nb-total">0</div><div class="l">Patients en attente</div></div>
    <div class="stat alerte"><div class="v" id="nb-critiques">0</div><div class="l">Niveaux critiques (ESI 1-2)</div></div>
    <div class="stat"><div class="v" id="att-moyen">—</div><div class="l">Attente moyenne</div></div>
    <div class="stat"><div class="v" id="derniere-maj">—</div><div class="l">Dernière mise à jour</div></div>
  </div>

  <div id="table-zone">
    <div class="section-titre">File d'attente — par ordre de priorité</div>
    <div class="vide"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" stroke="#444" stroke-width="2"/><path d="M16 24h16M24 16v16" stroke="#444" stroke-width="2" stroke-linecap="round"/></svg><p>Aucun patient en attente</p></div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io();

// Horloge temps réel
function majHorloge() {
  const now = new Date();
  document.getElementById('heure').textContent = now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('date-txt').textContent = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}
majHorloge();
setInterval(majHorloge, 1000);

// Réception des mises à jour temps réel
socket.on('file_mise_a_jour', data => {
  const file = data.file || [];
  const critiques = file.filter(p => p.esi_actuel <= 2).length;
  const attentes = file.map(p => p.temps_attente_min).filter(v => v > 0);
  const moy = attentes.length ? Math.round(attentes.reduce((a,b)=>a+b,0)/attentes.length) : 0;

  document.getElementById('nb-total').textContent    = file.length;
  document.getElementById('nb-critiques').textContent = critiques;
  document.getElementById('att-moyen').textContent   = moy ? moy + ' min' : '—';
  document.getElementById('derniere-maj').textContent = data.horodatage || '—';

  // Alertes critiques
  const az = document.getElementById('alertes-zone');
  const alertes = data.alertes || [];
  az.innerHTML = alertes.map(a => `
    <div class="alerte-banner">
      <div class="dot"></div>
      <p><strong>🚨 ALERTE — ${a.prenom || ''} ${a.nom || ''}</strong> — ESI ${a.esi_actuel} — Score ${a.score_priorite} — Attente ${a.temps_attente_min} min</p>
    </div>
  `).join('');

  // Table
  const zone = document.getElementById('table-zone');
  if (!file.length) {
    zone.innerHTML = `<div class="section-titre">File d'attente — par ordre de priorité</div><div class="vide"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" stroke="#444" stroke-width="2"/><path d="M16 24h16M24 16v16" stroke="#444" stroke-width="2" stroke-linecap="round"/></svg><p>Aucun patient en attente</p></div>`;
    return;
  }

  const lignes = file.map(p => {
    const mins = p.temps_attente_min || 0;
    const cls  = mins > 60 ? 'danger' : mins > 30 ? 'warn' : '';
    const attTextes = {1:'< 1 min',2:'< 15 min',3:'~30 min',4:'~1h',5:'~2h'};
    const esiLabels = {1:'Critique',2:'Très urgent',3:'Urgent',4:'Semi-urgent',5:'Non urgent'};
    return `
      <tr>
        <td style="font-weight:800;font-size:24px;color:var(--e5);width:60px;text-align:center">${p.position}</td>
        <td><div class="pill-esi p${p.esi_actuel}">${p.esi_actuel}</div></td>
        <td>
          <div class="nom">${p.prenom || 'Patient'} ${p.nom || ''}</div>
          <div class="sym">${p.symptom_text || '—'}</div>
        </td>
        <td style="font-size:14px;font-weight:700;color:var(--gris);text-transform:uppercase">${esiLabels[p.esi_actuel]||'—'}</td>
        <td><div class="badge-att">${attTextes[p.esi_actuel]||'—'}</div></td>
        <td><div class="timer ${cls}">${Math.floor(mins)} min</div></td>
        <td style="font-size:14px;font-weight:600;color:var(--gris)">${p.heure_arrivee||'—'}</td>
      </tr>`;
  }).join('');

  zone.innerHTML = `
    <div class="section-titre">File d'attente — par ordre de priorité</div>
    <table class="table-file">
      <thead><tr>
        <th>#</th><th>ESI</th><th>Patient</th><th>Niveau</th><th>Attente estimée</th><th>Temps d'attente</th><th>Arrivée</th>
      </tr></thead>
      <tbody>${lignes}</tbody>
    </table>`;
});

// Données de démo si pas de serveur
socket.on('connect_error', () => {
  const demo = {horodatage:'—',file:[],alertes:[]};
  socket.emit = () => {};
  document.getElementById('nb-total').textContent = '—';
});
</script>
</body>
</html>
