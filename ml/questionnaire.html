<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthGate Kiosk Patient - Questionnaire Adaptatif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .questions-container {
            display: grid;
            gap: 20px;
        }

        .question-card {
            padding: 20px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .question-card label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .question-card small {
            display: block;
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }

        /* Type: Oui/Non */
        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-choice {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-choice:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .btn-choice.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Type: Curseur (slider) */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .slider-value {
            min-width: 30px;
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
        }

        /* Type: Select */
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            transition: all 0.2s ease;
        }

        select:hover {
            border-color: #667eea;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Type: Nombre */
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .scenario-badge {
            display: inline-block;
            background: #f0f4ff;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .buttons-container {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }

        .alert-warning {
            background: #fff3e0;
            color: #f57c00;
            border-left: 4px solid #f57c00;
        }

        .scenario-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #764ba2;
        }

        .scenario-info h4 {
            color: #764ba2;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .scenario-list {
            list-style: none;
            padding: 0;
        }

        .scenario-list li {
            color: #666;
            font-size: 13px;
            padding: 4px 0;
        }

        .scenario-list li:before {
            content: "✓ ";
            color: #764ba2;
            font-weight: bold;
            margin-right: 6px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✓ Questions de Santé</h1>
            <p>Veuillez répondre aux questions suivantes pour affiner votre diagnostic</p>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 20px; color: #666;">Chargement des questions...</p>
        </div>

        <div id="content" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div id="alertBox"></div>

            <form id="questionnaireForm">
                <div class="questions-container" id="questionsContainer"></div>

                <div class="scenario-info" id="scenarioInfo">
                    <h4>📋 Scénarios Identifiés:</h4>
                    <ul class="scenario-list" id="scenarioList"></ul>
                </div>

                <div class="buttons-container">
                    <button type="button" class="btn btn-cancel" onclick="goBack()">Retour</button>
                    <button type="submit" class="btn btn-submit" id="submitBtn">Continuer vers le diagnostic</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Configuration
        const API_URL = 'http://localhost:5000';
        const socket = io(API_URL);

        let currentPatientId = null;
        let currentQuestions = [];
        let responses = {};

        // Au chargement: extraire patient_id de l'URL
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            currentPatientId = params.get('patient_id') || localStorage.getItem('current_patient_id');
            
            if (!currentPatientId) {
                showAlert('Erreur: Patient ID manquant', 'warning');
                return;
            }

            loadQuestions();
        });

        // Charger les questions depuis le serveur
        async function loadQuestions() {
            try {
                const response = await fetch(`${API_URL}/api/questions_adaptatif`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patient_id: currentPatientId })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Erreur chargement questions');
                }

                currentQuestions = data.questions_proposees || [];
                renderQuestions(data);
                showContent();

            } catch (error) {
                showAlert('Erreur: ' + error.message, 'warning');
                console.error(error);
            }
        }

        // Rendu des questions
        function renderQuestions(data) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            if (!currentQuestions || currentQuestions.length === 0) {
                container.innerHTML = '<p style="color: #999;">Aucune question adaptative.</p>';
                return;
            }

            currentQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                let input = '';
                const scenario = q.scenario || '';

                switch (q.type) {
                    case 'oui_non':
                        input = `
                            <div class="btn-group">
                                <button type="button" class="btn-choice" 
                                    onclick="setResponse('${q.id}', true, this)">
                                    Oui
                                </button>
                                <button type="button" class="btn-choice" 
                                    onclick="setResponse('${q.id}', false, this)">
                                    Non
                                </button>
                            </div>
                        `;
                        break;

                    case 'curseur':
                        const min = q.min || 0;
                        const max = q.max || 10;
                        input = `
                            <div class="slider-container">
                                <input type="range" min="${min}" max="${max}" value="${min}" 
                                    id="slider_${q.id}"
                                    onchange="setResponse('${q.id}', this.value, this)">
                                <span class="slider-value" id="value_${q.id}">${min}</span>
                            </div>
                        `;
                        break;

                    case 'choix_simple':
                        const options = q.options || [];
                        input = `
                            <select id="select_${q.id}" 
                                onchange="setResponse('${q.id}', this.value, this)">
                                <option value="">-- Sélectionner --</option>
                                ${options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                            </select>
                        `;
                        break;

                    case 'nombre':
                        input = `
                            <input type="number" id="number_${q.id}" 
                                placeholder="Entrez une valeur"
                                onchange="setResponse('${q.id}', this.value, this)">
                        `;
                        break;
                }

                card.innerHTML = `
                    ${scenario ? `<span class="scenario-badge">${scenario.replace(/_/g, ' ')}</span>` : ''}
                    <label>${q.question}</label>
                    ${input}
                    ${q.description ? `<small>${q.description}</small>` : ''}
                `;

                container.appendChild(card);
            });

            // Actualiser les scénarios
            updateScenarios(data.scenarios_matched || []);

            // Mettre à jour la progression
            const nb_questions = data.nb_questions || currentQuestions.length;
            const progress = (index + 1) / nb_questions * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        // Mettre à jour les badges de scénarios
        function updateScenarios(scenarios) {
            const list = document.getElementById('scenarioList');
            list.innerHTML = scenarios
                .map(s => `<li>${s.replace(/_/g, ' ')}</li>`)
                .join('');
        }

        // Enregistrer une réponse
        function setResponse(questionId, value, element) {
            responses[questionId] = value;
            
            // Activer le bouton de classe 'active' pour oui/non
            if (element && element.classList) {
                const siblings = element.parentElement.querySelectorAll('.btn-choice');
                siblings.forEach(s => s.classList.remove('active'));
                element.classList.add('active');
            }

            // Mettre à jour l'affichage du curseur
            if (element && element.type === 'range') {
                document.getElementById(`value_${questionId}`).textContent = value;
            }
        }

        // Soumettre le questionnaire
        document.getElementById('questionnaireForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Vérifier que toutes les questions sont répondues
            if (Object.keys(responses).length < currentQuestions.length) {
                showAlert('Veuillez répondre à toutes les questions', 'warning');
                return;
            }

            await submitResponses();
        });

        // Soumettre les réponses au serveur
        async function submitResponses() {
            try {
                document.getElementById('submitBtn').disabled = true;
                showLoading();

                const response = await fetch(`${API_URL}/api/reponses_adaptatif`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        patient_id: currentPatientId,
                        reponses: responses
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Erreur soumission');
                }

                // Sauvegarder le score adaptatif en session
                localStorage.setItem('adaptive_score', JSON.stringify(data));

                // Rediriger vers le résultat
                setTimeout(() => {
                    window.location.href = `resultat.html?patient_id=${currentPatientId}`;
                }, 1000);

            } catch (error) {
                document.getElementById('submitBtn').disabled = false;
                showAlert('Erreur: ' + error.message, 'warning');
                console.error(error);
                hideLoading();
            }
        }

        // Utilitaires UI
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').classList.add('hidden');
        }

        function showContent() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').classList.remove('hidden');
        }

        function showAlert(message, type = 'info') {
            const alertBox = document.getElementById('alertBox');
            const classes = `alert alert-${type}`;
            alertBox.innerHTML = `<div class="${classes}">${message}</div>`;
        }

        function goBack() {
            window.history.back();
        }

        // WebSocket: mettre à jour si données reçues
        socket.on('constantes_recu', (data) => {
            if (data.patient_id === currentPatientId) {
                console.log('✓ Constantes mises à jour:', data);
                // Recharger les questions avec nouvelles constantes
                setTimeout(loadQuestions, 500);
            }
        });
    </script>
</body>
</html>
